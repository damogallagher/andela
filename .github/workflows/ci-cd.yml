name: CI CD

on:
  pull_request:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to AWS after tests pass
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME || 'andela-guardrail-auditor' }}
  DEPLOY_ENVIRONMENT: ${{ vars.DEPLOY_ENVIRONMENT || 'dev' }}
  ALLOWED_INGRESS_CIDR: ${{ vars.ALLOWED_INGRESS_CIDR || '0.0.0.0/0' }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'andela/terraform.tfstate' }}
  TERRAFORM_VERSION: 1.15.5

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: andela_guardrails_test
          POSTGRES_USER: andela
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U andela -d andela_guardrails_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://andela@localhost:5432/andela_guardrails_test
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node for functional test frontend build
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements-lock.txt

      - name: Lint backend
        run: ./scripts/lint-backend.sh

      - name: Run unit tests
        run: ./scripts/test-unit.sh

      - name: Run functional tests
        run: ./scripts/test-functional.sh

      - name: Enforce 100 percent backend coverage
        run: ./scripts/test-coverage.sh

  code-scanning:
    name: Generate and upload SARIF
    runs-on: ubuntu-latest
    needs:
      - backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: andela_guardrails_sarif
          POSTGRES_USER: andela
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U andela -d andela_guardrails_sarif"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements-lock.txt

      - name: Generate sample SARIF
        env:
          APP_SCAN_ROOT: ${{ github.workspace }}
          DATABASE_URL: postgresql+psycopg://andela@localhost:5432/andela_guardrails_sarif
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from fastapi.testclient import TestClient

          from app.main import app

          with TestClient(app) as client:
              scan_response = client.post("/api/scans/sample")
              scan_response.raise_for_status()
              scan_id = scan_response.json()["id"]
              sarif_response = client.get(f"/api/scans/{scan_id}/sarif")
              sarif_response.raise_for_status()

          sarif_path = Path("andela-guardrail-auditor.sarif")
          sarif_path.write_text(json.dumps(sarif_response.json(), indent=2), encoding="utf-8")
          PY

      - name: Upload SARIF
        if: >
          github.event_name == 'push' ||
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: andela-guardrail-auditor.sarif
          category: andela-guardrail-auditor

  guardrail-cli:
    name: Guardrail CLI scan
    runs-on: ubuntu-latest
    needs:
      - code-scanning
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements-lock.txt

      - name: Verify risky fixtures fail on critical guardrail findings
        run: |
          set +e
          python -m app.cli scan sample_iac/ --fail-on critical
          status="$?"
          set -e
          if [ "$status" -ne 1 ]; then
            echo "Expected risky sample_iac fixtures to fail with critical findings, got exit code ${status}."
            exit 1
          fi

      - name: Block build on critical guardrail findings
        run: python -m app.cli scan sample_iac/scenarios/clean --fail-on critical

  frontend:
    name: UI lint, build, and Playwright
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint UI
        run: ./scripts/lint-frontend.sh

      - name: Build UI
        run: npm --prefix frontend run build

      - name: Install Playwright browsers
        run: npm --prefix frontend exec playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_USE_SYSTEM_CHROME: "0"
        run: npm --prefix frontend run test:e2e

  terraform:
    name: Terraform format and validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - terraform
      - guardrail-cli
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build application image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ env.PROJECT_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - terraform
      - docker-build
    if: >
      github.ref == 'refs/heads/dev' &&
      vars.AWS_ROLE_TO_ASSUME != '' &&
      vars.TF_STATE_BUCKET != '' &&
      vars.TF_STATE_LOCK_TABLE != '' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy))
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform init with S3 backend
        run: |
          terraform -chdir=terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${{ vars.TF_STATE_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Ensure ECR repository exists
        run: |
          terraform -chdir=terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=${DEPLOY_ENVIRONMENT}" \
            -var="allowed_ingress_cidr=${ALLOWED_INGRESS_CIDR}" \
            -var="container_image=bootstrap"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push application image
        id: image
        run: |
          ECR_REPOSITORY_URL="$(terraform -chdir=terraform output -raw ecr_repository_url)"
          IMAGE_URI="${ECR_REPOSITORY_URL}:${GITHUB_SHA}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "image_uri=${IMAGE_URI}" >> "${GITHUB_OUTPUT}"

      - name: Terraform plan
        run: |
          terraform -chdir=terraform plan -out=tfplan \
            -var="aws_region=${AWS_REGION}" \
            -var="project_name=${PROJECT_NAME}" \
            -var="environment=${DEPLOY_ENVIRONMENT}" \
            -var="allowed_ingress_cidr=${ALLOWED_INGRESS_CIDR}" \
            -var="container_image=${{ steps.image.outputs.image_uri }}"

      - name: Terraform apply
        run: terraform -chdir=terraform apply -auto-approve tfplan

      - name: Deployment outputs
        run: terraform -chdir=terraform output
