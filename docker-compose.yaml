services:
  db:
    image: postgres:17-alpine
    container_name: andela-postgres
    environment:
      POSTGRES_DB: andela_guardrails
      POSTGRES_USER: andela
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or your shell}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U andela -d andela_guardrails"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres17-data:/var/lib/postgresql/data

  app:
    build: .
    container_name: andela-app
    environment:
      DATABASE_URL: postgresql+psycopg://andela:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env or your shell}@db:5432/andela_guardrails
      APP_SCAN_ROOT: /app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    container_name: andela-frontend
    working_dir: /workspace/frontend
    command: sh -c "npm ci && npm run dev -- --port 5173"
    environment:
      VITE_API_PROXY_TARGET: http://app:8000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      app:
        condition: service_started
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/workspace/frontend
      - frontend-node-modules:/workspace/frontend/node_modules

volumes:
  postgres17-data:
  frontend-node-modules:
